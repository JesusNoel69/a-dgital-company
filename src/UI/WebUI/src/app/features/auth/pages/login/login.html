<main class="login__container">
  <img src="../../../../../assets/user_image.png" alt="user_default" class="login__image" />
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login__form">
    <div class="display_field">
      <label for="email">
        <img
          ngSrc="assets/user_icon.svg"
          alt=""
          width="48"
          height="48"
          class="login__input-image"
        />
      </label>
      <input type="email" placeholder="Email" formControlName="email" id="email" />
    </div>
    <div class="display_field">
      <label for="password">
        <img
          ngSrc="assets/lock_icon.svg"
          alt=""
          width="48"
          height="48"
          class="login__input-image"
        />
      </label>
      <input type="password" placeholder="Password" formControlName="password" id="password" />
    </div>
    <button type="submit" class="login__submit-button">Login</button>
    <section class="login__action">
      <div class="remember">
        <input type="checkbox" id="remember" />
        <label for="remember">Remember me?</label>
      </div>
      <a href="">Forgot Password</a>
    </section>
  </form>
  <section class="login__action" id="register_container">
    <p>Don't have an account?</p>
    <button type="button" class="login__register-button">Register Here</button>
  </section>
</main>
